name: "✨ Feature Request"
description: "Suggest an idea or improvement."
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement!

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and didn’t find a duplicate.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: "What problem are you trying to solve?"
      placeholder: "Right now it's hard to…"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: "What would you like to happen?"
      placeholder: "Add… so that…"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: "Other options you've thought about"
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: "Screenshots, examples, links, etc."
    validations:
      required: false
